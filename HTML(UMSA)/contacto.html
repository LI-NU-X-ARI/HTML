<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica del Día 9</title>
    <link rel="stylesheet" href="CSS/estilos.css">
</head>
<body>
    <header>
        <div class="menu">
            <ul>
                <li><a href=""> Inicio </a></li>
                <li> Formulario </li>
                <li> Tarjeta </li>
                <li> Mas sobre mi </li>
            </ul>
        </div>
        <div class=" formulario ">
            <h1>Formulario</h1>
        </div>
    </header>

    <main class="cuerpo">

        <form action="#" method="post">

            <fieldset>

                <legend>Datos personales</legend>

                <div>
                    <label for="nombre">
                        Nombre y Apellido:
                    </label>

                    <input
                        type="text"
                        id="nombre"
                        name="nombre_apellido"
                        required>
                </div>

                <br>

                <div>
                    <label for="edad">
                        Edad:
                    </label>

                    <input
                        type="number"
                        id="edad"
                        name="edad"
                        min="1"
                        max="100"
                        required>
                </div>

                <br>

                <div>
                    <label for="correo">
                        Correo electrónico:
                    </label>

                    <input
                        type="email"
                        id="correo"
                        name="correo"
                        required>
                </div>

            </fieldset>

            <br>

            <fieldset>

                <legend>Encuesta</legend>

                <p>¿Cómo prefieres estudiar?</p>

                <input
                    type="radio"
                    id="presencial"
                    name="modalidad_estudio"
                    value="presencial"
                    required>

                <label for="presencial">
                    Presencial
                </label>

                <input
                    type="radio"
                    id="virtual"
                    name="modalidad_estudio"
                    value="virtual">

                <label for="virtual">
                    Virtual
                </label>

                <input
                    type="radio"
                    id="mixto"
                    name="modalidad_estudio"
                    value="mixto">

                <label for="mixto">
                    Mixto
                </label>

                <p>¿Qué tecnologías conoces?</p>

                <input
                    type="checkbox"
                    id="html"
                    name="tecnologias"
                    value="html">

                <label for="html">
                    HTML
                </label>

                <input
                    type="checkbox"
                    id="css"
                    name="tecnologias"
                    value="css">

                <label for="css">
                    CSS
                </label>

                <input
                    type="checkbox"
                    id="javascript"
                    name="tecnologias"
                    value="javascript">

                <label for="javascript">
                    JavaScript
                </label>

                <br>

                <label for="departamento">
                    Selecciona dónde naciste:
                </label>

                <select
                    id="departamento"
                    name="departamento_nacimiento"
                    required>

                    <option value="">
                        Selecciona una opción
                    </option>

                    <option value="la-paz">
                        La Paz
                    </option>

                    <option value="oruro">
                        Oruro
                    </option>

                    <option value="cochabamba">
                        Cochabamba
                    </option>

                    <option value="potosi">
                        Potosí
                    </option>

                    <option value="sucre">
                        Sucre
                    </option>

                    <option value="tarija">
                        Tarija
                    </option>

                    <option value="beni">
                        Beni
                    </option>

                    <option value="pando">
                        Pando
                    </option>

                    <option value="santa-cruz">
                        Santa Cruz
                    </option>

                </select>

            </fieldset>

            <br>

            <button type="submit">
                Enviar formulario
            </button>

        </form>

    </main>
    <section class="main">
        <h2> Tarjeta de Presentacion </h2>
        <p> Mi nombre es Ariel David Guarachi Zapana </p>
    </section>
</body>

</html>
