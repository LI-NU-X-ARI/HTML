<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Práctica del Día 9</title>
</head>

<body>

    <header>
        <h1>Formulario de contacto</h1>

        <nav>
            <a href="index.html">Inicio</a>
            <a href="Ejercicio9.html">Contacto</a>
        </nav>
    </header>

    <main>

        <form action="#" method="post">

            <!-- PREGUNTA 1: DATOS PERSONALES -->
            <fieldset>

                <legend>Datos personales</legend>

                <div>
                    <label for="nombre">
                        Nombre y Apellido:
                    </label>

                    <input
                        type="text"
                        id="nombre"
                        name="nombre_apellido"
                        required>
                </div>

                <br>

                <div>
                    <label for="edad">
                        Edad:
                    </label>

                    <input
                        type="number"
                        id="edad"
                        name="edad"
                        min="1"
                        max="100"
                        required>
                </div>

                <br>

                <div>
                    <label for="correo">
                        Correo electrónico:
                    </label>

                    <input
                        type="email"
                        id="correo"
                        name="correo"
                        required>
                </div>

            </fieldset>

            <br>

            <fieldset>

                <legend>Validación</legend>

                <p>
                    Todos los campos son obligatorios.
                    La edad debe estar entre 1 y 100 años.
                </p>

            </fieldset>

            <br>

            <fieldset>

                <label for="departamento">
                    Selecciona dónde naciste:
                </label>

                <select
                    id="departamento"
                    name="departamento_nacimiento"
                    required>

                    <option value="">
                        Selecciona una opción
                    </option>

                    <option value="la-paz">
                        La Paz
                    </option>

                    <option value="oruro">
                        Oruro
                    </option>

                    <option value="cochabamba">
                        Cochabamba
                    </option>

                    <option value="potosi">
                        Potosí
                    </option>

                    <option value="sucre">
                        Sucre
                    </option>

                    <option value="tarija">
                        Tarija
                    </option>

                    <option value="beni">
                        Beni
                    </option>

                    <option value="pando">
                        Pando
                    </option>

                    <option value="santa-cruz">
                        Santa Cruz
                    </option>

                </select>

            </fieldset>

            <br>

            <button type="submit">
                Enviar formulario
            </button>
            
        </form>

    </main>

</body>

</html>
