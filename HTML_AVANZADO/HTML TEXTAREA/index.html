<!DOCTYPE html>
<html lang="es  ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> TEXTAREA </title>
    <link rel="stylesheet" href="styles1.css">
    <link rel="icon" href="logo_64x64.png" type="image/png">
</head>
<body>
    <form>
        <h2> Formulario de contacto </h2>
        <div class="form_input">
            <label for="nombre"> Nombre Completo </label>
            <input type="text" placeholder="Ariel David" id="nombre">
        </div>
        <div class="form_input">
            <label for="email"> Email </label>
            <input type="email" placeholder="ejemplo@gmail.com" id="email">
        </div>
        <div class="form_input">
            <label for="descripcion"> Descripcion </label>
            <textarea class="tarea" placeholder="Caracteristicas..." id="descripcion"></textarea>
        </div>
    </form>
</body> 
</html>
